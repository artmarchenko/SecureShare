services:
  relay:
    build: .
    restart: always
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8765
      - RELAY_MAX_CONN_PER_IP=10
      - RELAY_RATE_LIMIT=20
      - RELAY_ROOM_TIMEOUT=1800
    networks:
      - web

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
