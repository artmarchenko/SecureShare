# ──────────────────────────────────────────────────────────────
#  SecureShare Release Pipeline
#
#  Triggered by pushing a tag matching v* (e.g. v3.0.0).
#
#  1. Lint + import check (ubuntu, fast)
#  2. Server tests against live VPS (ubuntu)
#  3. Build .exe (windows-latest, PyInstaller)
#  4. Create GitHub Release with .exe attached
#  5. Deploy server to VPS (scp + docker compose)
# ──────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create releases

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: |
          flake8 app/ main.py build.py
          flake8 server/relay_server.py

      - name: Import check
        run: |
          python -c "
          from app.config import APP_NAME, APP_VERSION, PROTOCOL_VERSION
          from app.crypto_utils import CryptoSession
          from app.ws_relay import VPSRelaySender, VPSRelayReceiver
          print(f'{APP_NAME} v{APP_VERSION} proto={PROTOCOL_VERSION} — OK')
          "

  # ── Job 2: Server Tests ─────────────────────────────────────
  server-tests:
    name: Server Tests (live VPS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install "websocket-client>=1.7.0"

      - name: Run server test suite
        run: python server/test_relay.py

  # ── Job 3: Build .exe ───────────────────────────────────────
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python build.py

      - name: Verify .exe
        run: |
          $exe = "dist\SecureShare.exe"
          if (Test-Path $exe) {
            $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
            $ver = (Get-Item $exe).VersionInfo.FileVersion
            Write-Host "SecureShare.exe: $size MB, version $ver"
          } else {
            Write-Error ".exe not found!"
            exit 1
          }
        shell: pwsh

      - name: Package with version
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist\SecureShare.exe" "dist\SecureShare-$tag.exe"
          Compress-Archive -Path "dist\SecureShare.exe" -DestinationPath "dist\SecureShare-$tag.zip"
          Compress-Archive -Path "dist\SecureShare.exe" -DestinationPath "dist\SecureShare.zip"
          Write-Host "Created: SecureShare-$tag.exe, SecureShare-$tag.zip, SecureShare.zip"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureShare-build
          path: |
            dist/SecureShare-*.exe
            dist/SecureShare-*.zip
            dist/SecureShare.zip
          retention-days: 30

  # ── Job 4: Create Release ───────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, server-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          # Find previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG..$TAG" -- . ':!.github')
          else
            CHANGES=$(git log --oneline "$TAG" -- . ':!.github' | head -20)
          fi

          {
            echo "notes<<EOF"
            echo "## SecureShare $TAG"
            echo ""
            echo "### Changes"
            echo "$CHANGES" | sed 's/^/- /'
            echo ""
            echo "### Download"
            echo "Download \`SecureShare-$TAG.zip\`, extract and run — no installation needed."
            echo ""
            echo "### Requirements"
            echo "- Windows 10/11 (64-bit)"
            echo "- Internet connection"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SecureShare ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/SecureShare-${{ github.ref_name }}.zip
            dist/SecureShare-${{ github.ref_name }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Assets:** SecureShare-${{ github.ref_name }}.zip + .exe" >> $GITHUB_STEP_SUMMARY

  # ── Job 5: Deploy Server to VPS ─────────────────────────────
  deploy:
    name: Deploy Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build
          path: dist/

      - name: Copy server files to VPS
        run: |
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            server/relay_server.py \
            server/requirements.txt \
            server/Dockerfile \
            server/docker-compose.yml \
            server/Caddyfile \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/secureshare-relay/

      - name: Copy landing page to VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          DEST="/home/${{ secrets.VPS_USER }}/secureshare-relay/www"
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS} "mkdir -p ${DEST}"
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -r \
            server/www/* \
            ${VPS}:${DEST}/

      - name: Upload app to VPS for /download endpoint
        run: |
          TAG="${{ github.ref_name }}"
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          DEST="/home/${{ secrets.VPS_USER }}/secureshare-relay/downloads"

          # Copy versioned .zip
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            dist/SecureShare-${TAG}.zip \
            ${VPS}:${DEST}/SecureShare-${TAG}.zip

          # Create/overwrite SecureShare.zip as latest
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS} \
            "cp ${DEST}/SecureShare-${TAG}.zip ${DEST}/SecureShare.zip"

          echo "Uploaded: SecureShare-${TAG}.zip + SecureShare.zip (latest)"

      - name: Deploy with docker compose
        run: |
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/\$(whoami)/secureshare-relay && \
             docker compose up -d --build --force-recreate --remove-orphans && \
             sleep 5 && \
             docker compose ps"

      - name: Health check
        run: |
          echo "Waiting for server to be ready..."
          sleep 20

          # Check landing page (retry up to 3 times)
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              https://secureshare-relay.duckdns.org/ 2>/dev/null || echo "000")
            echo "Attempt $i — Landing page: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Landing page is UP"
              break
            fi
            sleep 5
          done

          # Check health endpoint
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://secureshare-relay.duckdns.org/health 2>/dev/null || echo "000")
          echo "Health endpoint: HTTP $HEALTH"
          if [ "$HEALTH" = "200" ]; then
            echo "✅ Health endpoint OK"
          else
            echo "⚠️ Health returned: $HEALTH"
          fi

          # Check download endpoint (HEAD to avoid downloading full file)
          DL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --head --max-time 15 \
            https://secureshare-relay.duckdns.org/download/SecureShare.zip 2>/dev/null || echo "000")
          echo "Download endpoint: HTTP $DL_STATUS"
          if [ "$DL_STATUS" = "200" ]; then
            echo "✅ Download endpoint OK"
          else
            echo "⚠️ Download returned: $DL_STATUS (may need manual check)"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key

      - name: Deploy summary
        run: |
          echo "## Server Deploy" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Server:** Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** https://secureshare-relay.duckdns.org/download/SecureShare.zip" >> $GITHUB_STEP_SUMMARY
