# ──────────────────────────────────────────────────────────────
#  SecureShare Release Pipeline
#
#  Triggered by pushing a tag matching v* (e.g. v3.0.0).
#
#  1. Lint + import check (ubuntu, fast)
#  2. Server tests against live VPS (ubuntu)
#  3. Build .exe (windows-latest, PyInstaller)
#  4. Build Linux binary (ubuntu-latest, PyInstaller)
#  5. Create GitHub Release with Windows + Linux assets
#  6. Upload binaries to VPS /download (SCP only, NO relay restart)
#
#  Note: Server deploy is handled separately by deploy-server.yml.
#  This workflow ONLY uploads downloadable binaries to the VPS.
# ──────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create releases

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        run: |
          flake8 app/ main.py build.py
          flake8 server/relay_server.py

      - name: Import check
        run: |
          python -c "
          from app.config import APP_NAME, APP_VERSION, PROTOCOL_VERSION
          from app.crypto_utils import CryptoSession
          from app.ws_relay import VPSRelaySender, VPSRelayReceiver
          print(f'{APP_NAME} v{APP_VERSION} proto={PROTOCOL_VERSION} — OK')
          "

  # ── Job 2: Server Tests ─────────────────────────────────────
  server-tests:
    name: Server Tests (live VPS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install "websocket-client>=1.7.0"

      - name: DNS warmup
        run: |
          for i in 1 2 3 4 5; do
            if host secureshare-relay.duckdns.org > /dev/null 2>&1; then
              echo "DNS resolved on attempt $i"
              break
            fi
            echo "DNS attempt $i failed, retrying in ${i}s..."
            sleep $i
          done

      - name: Wait for server healthy
        run: |
          echo "Waiting for relay server to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 5 \
              https://secureshare-relay.duckdns.org/api/version 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Server healthy on attempt $i (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 5s..."
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Server not responding after 30 attempts"
          fi

      - name: Run server test suite
        run: python server/test_relay.py

  # ── Job 3: Build .exe ───────────────────────────────────────
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller==6.19.0

      - name: Build with PyInstaller
        run: python build.py

      - name: Verify .exe
        run: |
          $exe = "dist\SecureShare.exe"
          if (Test-Path $exe) {
            $size = [math]::Round((Get-Item $exe).Length / 1MB, 1)
            $ver = (Get-Item $exe).VersionInfo.FileVersion
            Write-Host "SecureShare.exe: $size MB, version $ver"
          } else {
            Write-Error ".exe not found!"
            exit 1
          }
        shell: pwsh

      - name: Package with version
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item "dist\SecureShare.exe" "dist\SecureShare-$tag.exe"
          Compress-Archive -Path "dist\SecureShare.exe" -DestinationPath "dist\SecureShare-$tag.zip"
          Compress-Archive -Path "dist\SecureShare.exe" -DestinationPath "dist\SecureShare.zip"
          Write-Host "Created: SecureShare-$tag.exe, SecureShare-$tag.zip, SecureShare.zip"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureShare-build
          path: |
            dist/SecureShare-*.exe
            dist/SecureShare-*.zip
            dist/SecureShare.zip
          retention-days: 30

  # ── Job 4: Build Linux binary ────────────────────────────────
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install deps
        run: pip install -r requirements.txt pyinstaller==6.19.0

      - name: Build with PyInstaller
        run: python build.py

      - name: Verify binary
        run: |
          BIN="dist/SecureShare"
          if [ -f "$BIN" ]; then
            SIZE=$(du -h "$BIN" | cut -f1)
            echo "SecureShare: $SIZE"
            file "$BIN"
            chmod +x "$BIN"
          else
            echo "Binary not found!"
            exit 1
          fi

      - name: Package with version
        run: |
          TAG="${{ github.ref_name }}"
          chmod +x dist/SecureShare
          # Versioned tar.gz
          tar -czf "dist/SecureShare-${TAG}-linux-x64.tar.gz" -C dist SecureShare
          # Latest tar.gz
          cp "dist/SecureShare-${TAG}-linux-x64.tar.gz" "dist/SecureShare-linux-x64.tar.gz"
          echo "Created: SecureShare-${TAG}-linux-x64.tar.gz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecureShare-build-linux
          path: |
            dist/SecureShare-*-linux-x64.tar.gz
            dist/SecureShare-linux-x64.tar.gz
          retention-days: 30

  # ── Job 5: Create Release ───────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-linux, server-tests]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build
          path: dist/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build-linux
          path: dist/

      - name: Generate SHA-256 checksums
        run: |
          TAG="${{ github.ref_name }}"
          cd dist
          echo "# SecureShare $TAG — SHA-256 Checksums" > SHA256SUMS.txt
          echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> SHA256SUMS.txt
          for f in SecureShare-${TAG}.zip SecureShare-${TAG}.exe SecureShare-${TAG}-linux-x64.tar.gz; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> SHA256SUMS.txt
            fi
          done
          echo ""
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          # Find previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG..$TAG" -- . ':!.github')
          else
            CHANGES=$(git log --oneline "$TAG" -- . ':!.github' | head -20)
          fi

          CHECKSUMS=$(cat dist/SHA256SUMS.txt | grep -v '^#' | sed 's/^/    /')

          {
            echo "notes<<EOF"
            echo "## SecureShare $TAG"
            echo ""
            echo "### Changes"
            echo "$CHANGES" | sed 's/^/- /'
            echo ""
            echo "### Download"
            echo "| OS | File | Instructions |"
            echo "|---|---|---|"
            echo "| Windows | \`SecureShare-$TAG.zip\` | Extract and run — no installation needed |"
            echo "| Linux | \`SecureShare-$TAG-linux-x64.tar.gz\` | \`tar xzf SecureShare-*.tar.gz && chmod +x SecureShare && ./SecureShare\` |"
            echo ""
            echo "### SHA-256 Checksums"
            echo "\`\`\`"
            echo "$CHECKSUMS"
            echo "\`\`\`"
            echo ""
            echo "### Requirements"
            echo "- Windows 10/11 or Linux (64-bit)"
            echo "- Internet connection"
            echo ""
            echo "💡 **Auto-update:** SecureShare v3.3+ checks for updates automatically."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SecureShare ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            dist/SecureShare-${{ github.ref_name }}.zip
            dist/SecureShare-${{ github.ref_name }}.exe
            dist/SecureShare-${{ github.ref_name }}-linux-x64.tar.gz
            dist/SecureShare.zip
            dist/SecureShare-linux-x64.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Assets:** SecureShare-${{ github.ref_name }}.zip + .exe + linux-x64.tar.gz" >> $GITHUB_STEP_SUMMARY

  # ── Job 6: Upload binaries to VPS (NO relay restart) ────────
  upload-binaries:
    name: Upload Binaries to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release]

    # Same concurrency group as deploy-web/deploy-server
    concurrency:
      group: vps-deploy
      cancel-in-progress: false

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build
          path: dist/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: SecureShare-build-linux
          path: dist/

      - name: Upload binaries to VPS /download
        run: |
          TAG="${{ github.ref_name }}"
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          DEST="/home/${{ secrets.VPS_USER }}/secureshare-relay/downloads"

          # Ensure directory exists
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS} "mkdir -p ${DEST}"

          # Copy versioned Windows .zip
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            dist/SecureShare-${TAG}.zip \
            ${VPS}:${DEST}/SecureShare-${TAG}.zip

          # Create/overwrite SecureShare.zip as "latest"
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS} \
            "cp ${DEST}/SecureShare-${TAG}.zip ${DEST}/SecureShare.zip"

          # Copy versioned Linux tar.gz
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no \
            dist/SecureShare-${TAG}-linux-x64.tar.gz \
            ${VPS}:${DEST}/SecureShare-${TAG}-linux-x64.tar.gz

          # Create/overwrite latest Linux
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no ${VPS} \
            "cp ${DEST}/SecureShare-${TAG}-linux-x64.tar.gz ${DEST}/SecureShare-linux-x64.tar.gz"

          echo "✅ Uploaded: Windows .zip + Linux .tar.gz (versioned + latest)"

      - name: Verify downloads are accessible
        run: |
          sleep 3

          # Check download endpoint (HEAD only)
          DL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --head --max-time 15 \
            https://secureshare-relay.duckdns.org/download/SecureShare.zip 2>/dev/null || echo "000")
          echo "Windows download: HTTP $DL_STATUS"

          DL_LINUX=$(curl -s -o /dev/null -w "%{http_code}" \
            --head --max-time 15 \
            https://secureshare-relay.duckdns.org/download/SecureShare-linux-x64.tar.gz 2>/dev/null || echo "000")
          echo "Linux download: HTTP $DL_LINUX"

          if [ "$DL_STATUS" = "200" ] && [ "$DL_LINUX" = "200" ]; then
            echo "✅ Both downloads accessible"
          else
            echo "⚠️ Some downloads may need manual check"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key

      - name: Upload summary
        run: |
          echo "## Binaries Uploaded ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Relay restart:** NO ✓ (zero downtime)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| OS | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | https://secureshare-relay.duckdns.org/download/SecureShare.zip |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | https://secureshare-relay.duckdns.org/download/SecureShare-linux-x64.tar.gz |" >> $GITHUB_STEP_SUMMARY
