# ──────────────────────────────────────────────────────────────
#  SecureShare CI — Lint & Import Check
#
#  Runs on every push / PR that touches app code.
#  Fast feedback loop (~1 min) without building or deploying.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "main.py"
      - "build.py"
      - "requirements.txt"
      - "server/relay_server.py"
      - "server/analytics.py"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "main.py"
      - "build.py"
      - "requirements.txt"
      - "server/relay_server.py"
      - "server/analytics.py"
  workflow_dispatch:  # manual trigger for testing

jobs:
  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ci-${{ hashFiles('requirements.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install flake8 pip-audit

      - name: Security audit (pip-audit)
        run: |
          echo "## Checking client dependencies..."
          pip-audit -r requirements.txt
          echo "## Checking server dependencies..."
          pip-audit -r server/requirements.txt

      - name: Lint app code
        run: flake8 app/ main.py build.py

      - name: Lint server code
        run: flake8 server/relay_server.py

      - name: Import check
        run: |
          python -c "
          from app.config import APP_NAME, APP_VERSION, PROTOCOL_VERSION
          from app.crypto_utils import CryptoSession
          from app.ws_relay import VPSRelaySender, VPSRelayReceiver
          from app.updater import check_for_update, can_auto_update
          from app.telemetry import report_crash, report_session
          print(f'{APP_NAME} v{APP_VERSION} proto={PROTOCOL_VERSION} — all imports OK')
          "

      - name: Summary
        run: |
          echo "## CI Check ✅" >> $GITHUB_STEP_SUMMARY
          echo "Lint and import check passed." >> $GITHUB_STEP_SUMMARY
