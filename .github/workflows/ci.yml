# ──────────────────────────────────────────────────────────────
#  SecureShare CI — Lint + Import Check
#
#  Runs on every push and pull request.
#  Uses ubuntu-latest (cheapest runner, 1x billing).
#  Server tests are NOT included here — they run in release.yml
#  against the live VPS.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-check:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Cache pip ───────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ── Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      # ── Lint ────────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          echo "=== Linting client code ==="
          flake8 app/ main.py build.py
          echo "=== Linting server code ==="
          flake8 server/relay_server.py
          echo "✅ All lint checks passed"

      # ── Import Check ────────────────────────────────────────
      - name: Verify imports
        run: |
          python -c "
          from app.config import APP_NAME, APP_VERSION, VPS_RELAY_URL, PROTOCOL_VERSION
          from app.crypto_utils import CryptoSession
          from app.ws_relay import VPSRelaySender, VPSRelayReceiver
          print(f'{APP_NAME} v{APP_VERSION} — all imports OK')
          print(f'Protocol v{PROTOCOL_VERSION}')
          print(f'Relay: {VPS_RELAY_URL}')
          "

      # ── Summary ─────────────────────────────────────────────
      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Python:** 3.12" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint:** flake8 (app + server)" >> $GITHUB_STEP_SUMMARY
          echo "- **Import check:** all modules verified" >> $GITHUB_STEP_SUMMARY
